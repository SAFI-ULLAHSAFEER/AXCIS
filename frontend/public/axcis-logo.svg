<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none" aria-label="AXCIS">
  <defs>
    <linearGradient id="axcisBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- A -->
  <text x="0" y="38" font-family="'Outfit','Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="2">A</text>
  <!-- Stylized X: axis nodes + lines + growth arrow -->
  <g transform="translate(28, 6)" filter="url(#glow)">
    <line x1="4" y1="32" x2="28" y2="8" stroke="url(#axcisBlue)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="28" y1="32" x2="4" y2="8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="22" y1="10" x2="32" y2="2" stroke="url(#axcisBlue)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="32,2 28,6 30,8" fill="#00f0ff"/>
    <circle cx="4" cy="32" r="3.5" fill="#0066ff"/>
    <circle cx="28" cy="8" r="3" fill="#00f0ff"/>
    <circle cx="16" cy="20" r="2.5" fill="#ffffff"/>
    <circle cx="4" cy="8" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="28" cy="32" r="2" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- CIS -->
  <text x="68" y="38" font-family="'Outfit','Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="6">CIS</text>
  <text x="1" y="52" font-family="'Plus Jakarta Sans','Segoe UI',sans-serif" font-size="6" font-weight="500" fill="#5a8aff" letter-spacing="2">GLOBAL IT OPERATIONS</text>
</svg>
